# netlify.toml — raiz do repo
# Base directory configurado na UI do Netlify: modules/discover
# Paths aqui são relativos à base directory

[build]
  base    = "modules/discover"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
